<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo/cognix_icon.png') }}">

<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); padding: 20px;">

            <p style="color: var(--text-secondary); font-size: 16px; margin: 0 0 30px 0;">
                Desculpe, ocorreu um erro ao processar sua solicitação. Por favor, tente novamente mais tarde.
            </p>
            <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="display: inline-block; text-decoration: none;">

            </a>
